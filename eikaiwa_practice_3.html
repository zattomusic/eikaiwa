<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英作文練習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0; --surface: #FFFFFF; --surface2: #F0EDE6;
  --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
  --text: #1A1814; --text-muted: #6B6760; --text-hint: #A09C96;
  --accent: #3D5A80; --accent-light: #E8EFF7;
  --success: #2E7D5E; --success-light: #E8F5EE;
  --warn: #9B6700; --warn-light: #FFF3DC;
  --danger: #B83232; --danger-light: #FDEAEA;
  --radius: 10px; --radius-lg: 16px;
}
html { font-size: 16px; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.6; }
.page { max-width: 700px; margin: 0 auto; padding: 3rem 1.5rem 5rem; }

header { margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.25rem; display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
header h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; letter-spacing: -0.01em; }
header p { font-size: 0.875rem; color: var(--text-muted); margin-top: 3px; }
.header-nav { display: flex; gap: 6px; }
.nav-tab { padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 0.8rem; font-family: 'DM Sans', sans-serif; cursor: pointer; transition: all 0.12s; }
.nav-tab:hover { background: var(--surface2); color: var(--text); }
.nav-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

/* Question card on select screen */
.q-display-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.5rem; margin-bottom: 1rem; }
.q-display-label { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
.q-display-text { font-family: 'DM Serif Display', serif; font-size: 1.35rem; color: var(--text); line-height: 1.5; margin-bottom: 8px; }
.q-display-hint { font-size: 0.85rem; color: var(--text-muted); }
.badge { display: inline-block; font-size: 0.7rem; padding: 2px 7px; border-radius: 20px; font-weight: 500; letter-spacing: 0.03em; }
.badge-compare { background: #E1F5EE; color: #0F6E56; }
.badge-opinion { background: #EEEDFE; color: #534AB7; }
.badge-describe { background: #FAEEDA; color: #854F0B; }

.btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 20px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: var(--surface); color: var(--text); font-size: 0.875rem; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; transition: background 0.12s, transform 0.08s; white-space: nowrap; }
.btn:hover { background: var(--surface2); }
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
.btn-primary:hover { background: #2E4A6D; }
.btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
.btn-ghost { border-color: var(--border); color: var(--text-muted); }
.btn-ghost:hover { color: var(--text); background: var(--surface2); }
.btn-danger { border-color: var(--danger); color: var(--danger); background: transparent; }
.btn-danger:hover { background: var(--danger-light); }

/* Question card on write screen */
.q-card { background: var(--accent); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; position: relative; overflow: hidden; }
.q-card::before { content: ''; position: absolute; top: -20px; right: -20px; width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.07); pointer-events: none; }
.q-card-label { font-size: 0.72rem; letter-spacing: 0.08em; text-transform: uppercase; color: rgba(255,255,255,0.65); margin-bottom: 6px; }
.q-card-text { font-family: 'DM Serif Display', serif; font-size: 1.2rem; color: #fff; line-height: 1.5; }
.q-card-hint { font-size: 0.8rem; color: rgba(255,255,255,0.7); margin-top: 8px; }

.write-area { width: 100%; min-height: 300px; border: 1px solid var(--border-strong); border-radius: var(--radius); padding: 14px 16px; font-size: 1rem; font-family: 'DM Sans', sans-serif; line-height: 1.9; color: var(--text); background: var(--surface); resize: vertical; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
.write-area:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,90,128,0.1); }
.write-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; margin-bottom: 1rem; font-size: 0.78rem; color: var(--text-hint); }

.pre-submit { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; }
.pre-submit-title { font-size: 0.72rem; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 12px; }
.self-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.self-label { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; }
.star-group { display: flex; gap: 4px; }
.star-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface2); color: var(--text-hint); font-size: 0.8rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.1s; font-family: 'DM Sans', sans-serif; }
.star-btn.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
.star-btn:hover { border-color: var(--accent); color: var(--accent); }
.memo-label { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 5px; }
.memo-area { width: 100%; border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 12px; font-size: 0.875rem; font-family: 'DM Sans', sans-serif; color: var(--text); background: var(--surface2); resize: none; outline: none; line-height: 1.6; min-height: 60px; transition: border-color 0.15s; }
.memo-area:focus { border-color: var(--accent); background: var(--surface); }

.loading-box { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 0.875rem; }
.spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border-strong); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.result-box { border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-top: 1.5rem; background: var(--surface); }
.result-header { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 1rem 1.25rem; }
.result-header-top { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
.result-meta { font-size: 0.75rem; color: var(--text-hint); display: flex; gap: 14px; flex-wrap: wrap; margin-top: 2px; }
.save-status { font-size: 0.78rem; padding: 3px 10px; border-radius: 20px; margin-left: auto; }
.save-ok { background: var(--success-light); color: var(--success); }
.save-err { background: var(--danger-light); color: var(--danger); }
.save-ing { color: var(--text-hint); }

.score-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
.score-cell { background: var(--surface); padding: 12px 8px; text-align: center; }
.score-cell-label { font-size: 0.72rem; color: var(--text-hint); margin-bottom: 4px; }
.score-cell-val { font-size: 1.35rem; font-weight: 500; }
.score-cell-sub { font-size: 0.68rem; color: var(--text-hint); }
.delta { font-size: 0.72rem; padding: 1px 6px; border-radius: 10px; font-weight: 500; }
.delta-up { background: var(--success-light); color: var(--success); }
.delta-down { background: var(--danger-light); color: var(--danger); }
.delta-same { background: var(--surface2); color: var(--text-hint); }

.result-body { padding: 1.25rem; }
.section-title { font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-hint); margin-bottom: 8px; }
.overall-text { font-size: 0.9rem; line-height: 1.85; color: var(--text); background: var(--surface2); border-radius: var(--radius); padding: 12px 14px; }
.fb-item { border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px; }
.fb-original { padding: 10px 14px; font-size: 0.875rem; font-style: italic; color: var(--text-muted); border-bottom: 1px solid var(--border); background: var(--surface); }
.fb-issue { padding: 8px 14px; font-size: 0.84rem; color: var(--danger); background: var(--danger-light); border-bottom: 1px solid var(--border); }
.fb-fixed { padding: 8px 14px; font-size: 0.84rem; color: var(--success); background: var(--success-light); }
.fb-mark { font-weight: 500; margin-right: 5px; font-style: normal; }
.no-errors { font-size: 0.875rem; color: var(--success); padding: 12px 14px; background: var(--success-light); border-radius: var(--radius); }
.result-actions { display: flex; gap: 8px; margin-top: 1.5rem; flex-wrap: wrap; }
.error-box { font-size: 0.875rem; color: var(--danger); background: var(--danger-light); border: 1px solid rgba(184,50,50,0.2); border-radius: var(--radius); padding: 12px 14px; margin-top: 1rem; }
.section-actions { display: flex; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }

/* History */
.history-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 8px; }
.history-empty { text-align: center; padding: 4rem 1rem; color: var(--text-hint); font-size: 0.9rem; }
.h-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; margin-bottom: 10px; }
.h-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 10px; background: var(--surface2); cursor: pointer; transition: background 0.12s; }
.h-header:hover { background: var(--accent-light); }
.h-no { font-size: 0.7rem; color: var(--text-hint); flex-shrink: 0; font-weight: 500; min-width: 28px; }
.h-q { font-size: 0.875rem; color: var(--text); flex: 1; font-style: italic; line-height: 1.4; }
.h-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.h-score { font-family: 'DM Serif Display', serif; font-size: 1.1rem; }
.h-date { font-size: 0.72rem; color: var(--text-hint); }
.h-chev { font-size: 0.7rem; color: var(--text-hint); transition: transform 0.2s; display: inline-block; }
.h-body { display: none; padding: 14px 16px; border-top: 1px solid var(--border); }
.h-body.open { display: block; }
.h-stats { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
.h-stat { display: flex; flex-direction: column; gap: 2px; }
.h-stat-label { font-size: 0.65rem; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.05em; }
.h-stat-val { font-size: 0.85rem; font-weight: 500; color: var(--text); }
.h-essay { font-size: 0.84rem; color: var(--text-muted); white-space: pre-wrap; line-height: 1.8; border-left: 3px solid var(--border); padding-left: 12px; margin-bottom: 12px; }
.h-scores { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 6px; margin-bottom: 10px; }
.hs-cell { background: var(--surface2); border-radius: 8px; padding: 8px 4px; text-align: center; }
.hs-label { font-size: 0.65rem; color: var(--text-hint); }
.hs-val { font-size: 1rem; font-weight: 500; }
.h-overall { font-size: 0.84rem; color: var(--text); background: var(--surface2); border-radius: var(--radius); padding: 10px 12px; line-height: 1.7; margin-bottom: 10px; }
.h-memo { font-size: 0.8rem; color: var(--warn); background: var(--warn-light); border-radius: var(--radius); padding: 8px 12px; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="page">
  <header>
    <div>
      <h1>英作文練習</h1>
      <p>AIが問題を生成し、採点・スプレッドシートに保存します。</p>
    </div>
    <nav class="header-nav">
      <button class="nav-tab active" id="tab-btn-practice" onclick="switchTab('practice')">練習</button>
      <button class="nav-tab" id="tab-btn-history" onclick="switchTab('history')">履歴</button>
    </nav>
  </header>

  <!-- PRACTICE TAB -->
  <div id="tab-practice" class="screen active">

    <!-- Select screen -->
    <div id="pscreen-select" class="screen active">
      <div id="q-loading" class="loading-box"><span class="spinner"></span>問題を生成中です…</div>
      <div id="q-display-wrap" style="display:none">
        <div class="q-display-card">
          <div class="q-display-label">
            <span id="q-badge"></span>
            今日の問題
          </div>
          <div class="q-display-text" id="q-display-text"></div>
          <div class="q-display-hint" id="q-display-hint"></div>
        </div>
        <div class="section-actions">
          <button class="btn btn-primary" onclick="startWrite()">この問題で書く →</button>
          <button class="btn btn-ghost" id="reload-btn" onclick="genQuestion()">別の問題に変える</button>
        </div>
      </div>
      <div id="q-error" style="display:none" class="error-box">
        問題の生成に失敗しました。
        <button class="btn btn-ghost" style="margin-top:8px" onclick="genQuestion()">再試行</button>
      </div>
    </div>

    <!-- Write screen -->
    <div id="pscreen-write" class="screen">
      <div class="q-card">
        <div class="q-card-label">問題</div>
        <div class="q-card-text" id="q-disp"></div>
        <div class="q-card-hint" id="q-hint"></div>
      </div>
      <textarea class="write-area" id="essay-input" placeholder="ここに英文を書いてください…" oninput="updateCount()"></textarea>
      <div class="write-meta">
        <span id="wcount">0 words</span>
        <span>提出前に自己評価を入力してください</span>
      </div>
      <div class="pre-submit">
        <div class="pre-submit-title">提出前の自己評価</div>
        <div class="self-row">
          <span class="self-label">今回の出来：</span>
          <div class="star-group" id="star-group">
            <button class="star-btn" data-val="1" onclick="setSelf(1)">1</button>
            <button class="star-btn" data-val="2" onclick="setSelf(2)">2</button>
            <button class="star-btn" data-val="3" onclick="setSelf(3)">3</button>
            <button class="star-btn" data-val="4" onclick="setSelf(4)">4</button>
            <button class="star-btn" data-val="5" onclick="setSelf(5)">5</button>
          </div>
          <span style="font-size:0.78rem;color:var(--text-hint)" id="self-label-text">未選択</span>
        </div>
        <div class="memo-label">メモ（任意）</div>
        <textarea class="memo-area" id="memo-input" placeholder="今日意識したこと、気づいたことなど…" rows="2"></textarea>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-primary" id="submit-btn" onclick="submitEssay()">提出して採点する →</button>
        <button class="btn btn-ghost" onclick="backToSelect()">← 問題を変える</button>
      </div>
      <div id="result-area"></div>
    </div>
  </div>

  <!-- HISTORY TAB -->
  <div id="tab-history" class="screen">
    <div class="history-bar">
      <span style="font-size:0.8rem;color:var(--text-hint)" id="h-count"></span>
      <button class="btn btn-danger" onclick="clearAll()">ローカル履歴を全削除</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbz8vzqqDLXywwYenKk9tL-vHMvehUrNZe9mbGnmIH2PzLdQjoJEXASZY0cpjlZf4JaG/exec';
const SK = 'eikaiwa_v4';
const SELF_LABELS = ['','あまり書けなかった','まあまあ','そこそこ書けた','よく書けた','完璧に近い'];

let currentQ = null, selfScore = 0;

/* ===== STORAGE ===== */
function getHistory() { try { return JSON.parse(localStorage.getItem(SK)||'[]'); } catch(e){ return []; } }
function setHistory(l) { localStorage.setItem(SK, JSON.stringify(l)); }
function nextNo() { const h=getHistory(); return h.length>0?Math.max(...h.map(r=>r.no||0))+1:1; }
function pushRecord(r) { const l=getHistory(); l.unshift(r); if(l.length>200)l.pop(); setHistory(l); }
function prevTotal() { const h=getHistory(); return h.length>0?h[0].result.total:null; }

/* ===== GAS CALL ===== */
async function gasPost(payload) {
  const res = await fetch(GAS, { method:'POST', body: JSON.stringify(payload) });
  return await res.json();
}

/* ===== TAB ===== */
function switchTab(tab) {
  ['practice','history'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('tab-btn-'+t).classList.toggle('active', t===tab);
  });
  if(tab==='history') renderHistory();
}

/* ===== SELF SCORE ===== */
function setSelf(val) {
  selfScore = val;
  document.querySelectorAll('.star-btn').forEach(b => b.classList.toggle('selected', +b.dataset.val===val));
  document.getElementById('self-label-text').textContent = SELF_LABELS[val];
}

/* ===== SCREENS ===== */
function backToSelect() { showPScreen('pscreen-select'); }
function showPScreen(id) {
  document.querySelectorAll('#tab-practice .screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function startWrite() {
  document.getElementById('essay-input').value='';
  document.getElementById('memo-input').value='';
  document.getElementById('wcount').textContent='0 words';
  document.getElementById('result-area').innerHTML='';
  document.getElementById('submit-btn').disabled=false;
  selfScore=0;
  document.querySelectorAll('.star-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('self-label-text').textContent='未選択';
  document.getElementById('q-disp').textContent = currentQ.text;
  document.getElementById('q-hint').textContent = currentQ.hint;
  showPScreen('pscreen-write');
}

/* ===== GENERATE QUESTION ===== */
async function genQuestion() {
  document.getElementById('q-loading').style.display='block';
  document.getElementById('q-display-wrap').style.display='none';
  document.getElementById('q-error').style.display='none';
  if(document.getElementById('reload-btn')) document.getElementById('reload-btn').disabled=true;

  try {
    const data = await gasPost({ type:'generate' });
    if(data.status!=='ok') throw new Error();
    const q = data.question;
    currentQ = q;

    const badgeMap = {compare:['compare','比較'],opinion:['opinion','意見'],describe:['describe','説明']};
    const [cls,label] = badgeMap[q.type]||['opinion','意見'];
    document.getElementById('q-badge').innerHTML = `<span class="badge badge-${cls}">${label}</span>`;
    document.getElementById('q-display-text').textContent = q.text;
    document.getElementById('q-display-hint').textContent = q.hint;

    document.getElementById('q-loading').style.display='none';
    document.getElementById('q-display-wrap').style.display='block';
  } catch(e) {
    document.getElementById('q-loading').style.display='none';
    document.getElementById('q-error').style.display='block';
  }
  if(document.getElementById('reload-btn')) document.getElementById('reload-btn').disabled=false;
}

/* ===== WORD COUNT ===== */
function updateCount() {
  const v=document.getElementById('essay-input').value.trim();
  const n=v?v.split(/\s+/).filter(Boolean).length:0;
  document.getElementById('wcount').textContent=n+' word'+(n!==1?'s':'');
}
function wc(t){ return t.trim()?t.trim().split(/\s+/).filter(Boolean).length:0; }

/* ===== SUBMIT ===== */
async function submitEssay() {
  const essay=document.getElementById('essay-input').value.trim();
  const memo=document.getElementById('memo-input').value.trim();
  if(!essay||wc(essay)<5){
    document.getElementById('result-area').innerHTML='<div class="error-box">5語以上の英文を入力してください。</div>';
    return;
  }
  document.getElementById('submit-btn').disabled=true;
  document.getElementById('result-area').innerHTML='<div class="loading-box"><span class="spinner"></span>採点中です。少々お待ちください…</div>';

  try {
    /* 1. 採点 */
    const gradeData = await gasPost({ type:'grade', question:currentQ.text, essay });
    if(gradeData.status!=='ok') throw new Error('採点に失敗しました');
    const result = gradeData.result;

    /* 2. ローカル保存 */
    const no=nextNo(), prev=prevTotal();
    const now=new Date();
    const dateStr=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const wordCount=wc(essay);
    const rec={ id:now.getTime(), no, date:dateStr, question:currentQ.text, type:currentQ.type, essay, wordCount, selfScore:selfScore||null, memo, prevTotal:prev, result };
    pushRecord(rec);

    /* 3. 結果表示 */
    renderResult(result, rec);

    /* 4. スプレッドシート保存 */
    const saveEl=document.getElementById('save-status');
    try {
      const fb=(result.sentence_feedback||[]).map(f=>`[原文] ${f.original}\n[指摘] ${f.issue}\n[修正] ${f.fixed}`).join('\n\n');
      const genre=currentQ.type==='compare'?'比較':currentQ.type==='opinion'?'意見':'説明';
      const sr=await gasPost({
        type:'save', no, date:dateStr, genre, question:currentQ.text, essay, word_count:wordCount,
        self_score:selfScore||'未選択', memo, overall:result.overall,
        total:result.total, prev_total:prev!==null?prev:'初回', delta:prev!==null?(result.total-prev):'—',
        vocabulary:result.scores.vocabulary, grammar:result.scores.grammar,
        content:result.scores.content, structure:result.scores.structure,
        error_count:(result.sentence_feedback||[]).length, top_error:topError(result.sentence_feedback), feedback:fb
      });
      if(sr.status==='ok'){
        saveEl.textContent='✓ スプレッドシートに保存しました';
        saveEl.className='save-status save-ok';
      } else throw new Error();
    } catch(se){
      saveEl.textContent='⚠ シート保存に失敗（ローカルには保存済み）';
      saveEl.className='save-status save-err';
    }
  } catch(e){
    document.getElementById('result-area').innerHTML=`<div class="error-box">${e.message||'エラーが発生しました。もう一度お試しください。'}</div>`;
    document.getElementById('submit-btn').disabled=false;
  }
}

/* ===== HELPERS ===== */
function scoreColor(n,max){ const p=n/max; return p>=0.75?'var(--success)':p>=0.5?'var(--warn)':'var(--danger)'; }
function deltaHTML(cur,prev){
  if(prev===null) return '';
  const d=cur-prev;
  if(d>0) return `<span class="delta delta-up">▲${d}</span>`;
  if(d<0) return `<span class="delta delta-down">▼${Math.abs(d)}</span>`;
  return `<span class="delta delta-same">→ 前回と同じ</span>`;
}
function topError(fb){
  if(!fb||!fb.length) return 'なし';
  const t=fb.map(f=>f.issue).join(' ');
  const s={'文法':0,'語彙':0,'冠詞':0,'時制':0,'前置詞':0,'単複':0};
  if(/文法|構造|動詞|不定詞|動名詞/.test(t)) s['文法']+=2;
  if(/語い|語彙|表現|単語/.test(t)) s['語彙']+=2;
  if(/冠詞|a |an |the /.test(t)) s['冠詞']+=2;
  if(/時制|過去|現在|未来/.test(t)) s['時制']+=2;
  if(/前置詞/.test(t)) s['前置詞']+=2;
  if(/単数|複数/.test(t)) s['単複']+=2;
  const top=Object.entries(s).sort((a,b)=>b[1]-a[1])[0];
  return top[1]>0?top[0]:'複合的';
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* ===== RENDER RESULT ===== */
function renderResult(r,rec){
  const s=r.scores;
  const cats=[['語彙','vocabulary'],['文法','grammar'],['内容','content'],['構成','structure']];
  const grid=cats.map(([l,k])=>`<div class="score-cell"><div class="score-cell-label">${l}</div><div class="score-cell-val" style="color:${scoreColor(s[k],4)}">${s[k]}</div><div class="score-cell-sub">/ 4</div></div>`).join('');
  const errCount=(r.sentence_feedback||[]).length;
  const genre=rec.type==='compare'?'比較':rec.type==='opinion'?'意見':'説明';
  let fb='';
  if(r.sentence_feedback&&r.sentence_feedback.length>0){
    fb=r.sentence_feedback.map(f=>`<div class="fb-item"><div class="fb-original">${esc(f.original)}</div><div class="fb-issue"><i class="fb-mark">⚠</i>${esc(f.issue)}</div><div class="fb-fixed"><i class="fb-mark">✓</i>${esc(f.fixed)}</div></div>`).join('');
  } else {
    fb='<div class="no-errors">✓ 文法的な大きな誤りは見当たりませんでした。</div>';
  }
  document.getElementById('result-area').innerHTML=`
    <div class="result-box">
      <div class="result-header">
        <div class="result-header-top">
          <span style="font-size:0.8rem;color:var(--text-muted)">合計</span>
          <span style="font-family:'DM Serif Display',serif;font-size:1.6rem;color:${scoreColor(r.total,16)}">${r.total}</span>
          <span style="font-size:0.85rem;color:var(--text-muted)">/ 16点</span>
          ${deltaHTML(r.total,rec.prevTotal)}
          <span class="save-status save-ing" id="save-status"><span class="spinner" style="width:13px;height:13px;border-width:1.5px;margin-right:4px"></span>保存中…</span>
        </div>
        <div class="result-meta">
          <span>#${rec.no} &nbsp;${rec.date}</span>
          <span>ジャンル：${genre}</span>
          <span>${rec.wordCount} words</span>
          <span>指摘：${errCount}箇所（主に${topError(r.sentence_feedback)}）</span>
          ${rec.selfScore?`<span>自己評価：${rec.selfScore}/5</span>`:''}
        </div>
      </div>
      <div class="score-grid">${grid}</div>
      <div class="result-body">
        ${rec.memo?`<div class="section-title">メモ</div><div class="overall-text" style="margin-bottom:1rem;background:var(--warn-light)">${esc(rec.memo)}</div>`:''}
        <div class="section-title">総評</div>
        <div class="overall-text">${esc(r.overall)}</div>
        <div class="section-title" style="margin-top:1.25rem">文ごとの指摘</div>
        ${fb}
        <div class="result-actions">
          <button class="btn btn-ghost" onclick="retryEssay()">書き直す</button>
          <button class="btn btn-ghost" onclick="backToSelect()">別の問題へ</button>
          <button class="btn btn-ghost" onclick="switchTab('history')">履歴を見る →</button>
        </div>
      </div>
    </div>`;
}

function retryEssay(){
  document.getElementById('essay-input').value='';
  document.getElementById('wcount').textContent='0 words';
  document.getElementById('result-area').innerHTML='';
  document.getElementById('submit-btn').disabled=false;
  selfScore=0;
  document.querySelectorAll('.star-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('self-label-text').textContent='未選択';
}

/* ===== HISTORY ===== */
function renderHistory(){
  const list=getHistory();
  document.getElementById('h-count').textContent=list.length>0?`${list.length}件の記録`:'';
  const el=document.getElementById('history-list');
  if(!list.length){ el.innerHTML='<div class="history-empty">まだ記録がありません。<br>練習して採点すると、ここに保存されます。</div>'; return; }
  el.innerHTML='';
  list.forEach(rec=>{
    const r=rec.result,s=r.scores;
    const cats=[['語彙','vocabulary'],['文法','grammar'],['内容','content'],['構成','structure']];
    const sg=cats.map(([l,k])=>`<div class="hs-cell"><div class="hs-label">${l}</div><div class="hs-val" style="color:${scoreColor(s[k],4)}">${s[k]}<span style="font-size:0.6rem;color:var(--text-hint)">/4</span></div></div>`).join('');
    const errCount=(r.sentence_feedback||[]).length;
    const genre=rec.type==='compare'?'比較':rec.type==='opinion'?'意見':'説明';
    let fbHTML='';
    if(r.sentence_feedback&&r.sentence_feedback.length>0){
      fbHTML=`<div class="section-title" style="margin-top:12px;margin-bottom:6px">文ごとの指摘</div>`+r.sentence_feedback.map(f=>`<div class="fb-item" style="margin-bottom:8px"><div class="fb-original">${esc(f.original)}</div><div class="fb-issue"><i class="fb-mark">⚠</i>${esc(f.issue)}</div><div class="fb-fixed"><i class="fb-mark">✓</i>${esc(f.fixed)}</div></div>`).join('');
    }
    const card=document.createElement('div');
    card.className='h-card';
    card.innerHTML=`
      <div class="h-header" onclick="toggleCard(this)">
        <span class="h-no">#${rec.no||'—'}</span>
        <span class="h-q">${esc(rec.question)}</span>
        <span class="h-meta">
          <span class="h-score" style="color:${scoreColor(r.total,16)}">${r.total}<span style="font-size:0.7rem;color:var(--text-hint)">/16</span></span>
          ${rec.prevTotal!==null&&rec.prevTotal!==undefined?deltaHTML(r.total,rec.prevTotal):''}
          <span class="h-date">${rec.date||''}</span>
          <span class="h-chev">▼</span>
        </span>
      </div>
      <div class="h-body">
        <div class="h-stats">
          <div class="h-stat"><span class="h-stat-label">ジャンル</span><span class="h-stat-val">${genre}</span></div>
          <div class="h-stat"><span class="h-stat-label">単語数</span><span class="h-stat-val">${rec.wordCount||'—'} words</span></div>
          <div class="h-stat"><span class="h-stat-label">指摘箇所</span><span class="h-stat-val">${errCount}箇所</span></div>
          <div class="h-stat"><span class="h-stat-label">主なエラー</span><span class="h-stat-val">${topError(r.sentence_feedback)}</span></div>
          <div class="h-stat"><span class="h-stat-label">自己評価</span><span class="h-stat-val">${rec.selfScore?rec.selfScore+'/5':'—'}</span></div>
          <div class="h-stat"><span class="h-stat-label">前回差</span><span class="h-stat-val">${rec.prevTotal!==null&&rec.prevTotal!==undefined?(r.total-rec.prevTotal>0?'+':'')+(r.total-rec.prevTotal):'初回'}</span></div>
        </div>
        ${rec.memo?`<div class="h-memo">📝 ${esc(rec.memo)}</div>`:''}
        <div class="section-title" style="margin-bottom:6px">提出した英文</div>
        <div class="h-essay">${esc(rec.essay)}</div>
        <div class="section-title" style="margin-bottom:6px">採点結果</div>
        <div class="h-scores">${sg}</div>
        <div class="h-overall">${esc(r.overall)}</div>
        ${fbHTML}
        <div style="margin-top:12px;text-align:right">
          <button class="btn btn-danger" style="font-size:0.78rem;padding:6px 12px" onclick="deleteRecord(${rec.id})">この記録を削除</button>
        </div>
      </div>`;
    el.appendChild(card);
  });
}

function toggleCard(hdr){
  const body=hdr.nextElementSibling,chev=hdr.querySelector('.h-chev');
  body.classList.toggle('open');
  chev.style.transform=body.classList.contains('open')?'rotate(180deg)':'';
}
function deleteRecord(id){
  if(!confirm('この記録を削除しますか？')) return;
  setHistory(getHistory().filter(r=>r.id!==id));
  renderHistory();
}
function clearAll(){
  if(!confirm('ローカル履歴をすべて削除しますか？\n※スプレッドシートのデータは残ります。')) return;
  setHistory([]); renderHistory();
}

genQuestion();
</script>
